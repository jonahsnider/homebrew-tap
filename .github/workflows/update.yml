name: Update package versions

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    name: Update package versions

    runs-on: macos-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v6
      - run: brew test-bot --only-cleanup-before
      - run: brew test-bot --only-setup
      - name: List formulae in tap
        id: list-formulae
        run: |
          formulae=$(find Formula -maxdepth 1 -name "*.rb" -type f -exec basename {} .rb \; | sed 's/^/jonahsnider\/tap\//' | tr '\n' ' ')
          echo "formulae=$formulae" >> "$GITHUB_OUTPUT"
      - name: Bump packages
        uses: Homebrew/actions/bump-packages@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          formulae: ${{ steps.list-formulae.outputs.formulae }}
          fork: false

