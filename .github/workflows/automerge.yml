name: Automerge

on:
  workflow_run:
    workflows:
      - brew test-bot
    types:
      - completed

jobs:
  automerge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BREW_COMMIT_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Add pr-pull label to bot PRs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/actions/runs/$RUN_ID" --jq '.pull_requests[0].number')

          if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
            echo "No pull request associated with this workflow run"
            exit 0
          fi

          PR_AUTHOR=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.user.login')

          if [[ "$PR_AUTHOR" == "github-actions[bot]" || "$PR_AUTHOR" == "jonahsnider[bot]" ]]; then
            echo "Adding pr-pull label to PR #$PR_NUMBER"
            gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" --add-label "pr-pull"
          else
            echo "PR #$PR_NUMBER author is $PR_AUTHOR, skipping"
          fi
